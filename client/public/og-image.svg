<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="250" fill="#4f46e5" opacity="0.08" />
  <circle cx="1050" cy="480" r="180" fill="#7c3aed" opacity="0.06" />
  <circle cx="100" cy="530" r="200" fill="#4f46e5" opacity="0.05" />

  <!-- Accent bar -->
  <rect x="80" y="240" width="6" height="120" fill="url(#accent)" rx="3" />

  <!-- Logo / Brand name -->
  <text x="108" y="295" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="-1">
    Epitaphe
  </text>
  <text x="108" y="365" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#accent)" letter-spacing="-1">
    360
  </text>

  <!-- Tagline -->
  <text x="108" y="415" font-family="Arial, sans-serif" font-size="26" fill="#a5b4fc" letter-spacing="1">
    Agence de Communication 360°
  </text>

  <!-- Location badge -->
  <rect x="108" y="450" width="200" height="36" rx="18" fill="#4f46e5" opacity="0.3" />
  <text x="208" y="474" font-family="Arial, sans-serif" font-size="18" fill="#c7d2fe" text-anchor="middle">
    📍 Casablanca, Maroc
  </text>

  <!-- URL -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="20" fill="#6b7280" text-anchor="end">
    www.epitaphe360.ma
  </text>
</svg>
